<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YOUDESIGN</title>
  <style>
    :root {
      --bg: #f7f7f9;
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --muted-2: #9a9aa0;
      --panel: rgba(255, 255, 255, .86);
      --panel-solid: #ffffff;
      --panel-2: #f9f9fb;
      --line: rgba(29, 29, 31, .09);
      --line-strong: rgba(29, 29, 31, .15);
      --accent: #0071e3;
      --accent-soft: #e8f2ff;
      --accent-softer: rgba(0, 113, 227, .09);
      --green: #34c759;
      --shadow: 0 28px 78px rgba(15, 23, 42, .16);
      --soft-shadow: 0 10px 34px rgba(15, 23, 42, .09);
      --inner-shadow: 0 1px 0 rgba(255, 255, 255, .84) inset;
      --radius: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(180deg, #fbfbfd 0, #f4f4f7 46%, #ededf1 100%);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    button, input, select, textarea { font: inherit; }
    button {
      cursor: pointer;
      transition: background .16s ease, border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    }

    button:active {
      transform: scale(.985);
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(252, 252, 253, .78);
      backdrop-filter: blur(28px) saturate(1.35);
      box-shadow: var(--inner-shadow), 0 10px 28px rgba(15, 23, 42, .04);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 260px;
    }

    .brand strong {
      font-size: 17px;
      font-weight: 850;
      letter-spacing: -.01em;
    }

    .brand span, .dim {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn, .icon-btn, .field, select, input[type="color"] {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .78);
      color: var(--ink);
      min-height: 34px;
      border-radius: var(--radius);
      backdrop-filter: blur(18px) saturate(1.2);
    }

    .btn, .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 650;
      box-shadow: var(--inner-shadow), 0 2px 8px rgba(15, 23, 42, .04);
    }

    .btn:hover, .icon-btn:hover, .preset:hover, .layer:hover {
      background: rgba(255, 255, 255, .96);
      border-color: rgba(0, 0, 0, .18);
      box-shadow: var(--inner-shadow), 0 8px 18px rgba(15, 23, 42, .08);
    }

    .btn:focus-visible,
    .icon-btn:focus-visible,
    .preset:focus-visible,
    .search:focus,
    .control:focus,
    select:focus {
      outline: 3px solid rgba(0, 113, 227, .18);
      border-color: var(--accent);
    }

    .btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 24px rgba(0, 113, 227, .28);
    }

    .btn.primary:hover {
      background: #0077ed;
      border-color: #0077ed;
    }

    .icon-btn {
      width: 36px;
      padding: 0;
    }

    .ri {
      width: 18px;
      height: 18px;
      display: block;
      fill: currentColor;
      flex: 0 0 auto;
    }

    .icon-btn .ri {
      width: 17px;
      height: 17px;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 424px 1fr 320px;
    }

    aside {
      min-height: 0;
      overflow: auto;
      background: rgba(250, 250, 252, .64);
      backdrop-filter: blur(24px) saturate(1.24);
    }

    .left {
      border-right: 1px solid var(--line);
      display: grid;
      grid-template-columns: 96px 1fr;
      overflow: hidden;
    }

    .right {
      border-left: 1px solid var(--line);
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(24px) saturate(1.16);
    }

    .right .section {
      padding: 0;
      border-bottom: 1px solid var(--line);
    }

    .inspector-header {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .78);
      backdrop-filter: blur(24px) saturate(1.18);
      box-shadow: var(--inner-shadow);
    }

    .inspector-title {
      margin: 0;
      font-size: 14px;
      font-weight: 800;
    }

    .inspector-subtitle {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .inspector-body {
      display: grid;
      gap: 0;
      padding: 0;
    }

    .inspector-group {
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .86);
    }

    .inspector-group-title {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 750;
    }

    .inspector-content {
      display: grid;
      gap: 9px;
      padding: 0 12px 12px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .field-grid.four {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .compact-field {
      min-width: 0;
    }

    .compact-field label {
      display: block;
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .compact-field input,
    .compact-field select,
    .compact-field textarea {
      width: 100%;
      min-height: 30px;
      border: 1px solid transparent;
      border-radius: 9px;
      background: rgba(118, 118, 128, .09);
      color: var(--ink);
      padding: 6px 8px;
      outline: none;
      font-size: 12px;
    }

    .compact-field input:hover,
    .compact-field select:hover,
    .compact-field textarea:hover {
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, .94);
    }

    .compact-field input:focus,
    .compact-field select:focus,
    .compact-field textarea:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(0, 113, 227, .12);
    }

    .compact-field textarea {
      min-height: 72px;
      resize: vertical;
    }

    .inline-control {
      display: grid;
      grid-template-columns: 56px 1fr 42px;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .inline-control output {
      text-align: right;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }

    .button-row.three {
      grid-template-columns: repeat(3, 1fr);
    }

    .mini-btn {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, .74);
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .mini-btn .ri {
      width: 14px;
      height: 14px;
    }

    .mini-btn:hover {
      background: #fff;
      border-color: rgba(0, 0, 0, .24);
      box-shadow: 0 5px 14px rgba(15, 23, 42, .06);
    }

    .mini-btn.active {
      border-color: rgba(0, 113, 227, .42);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .section {
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .quick-tools {
      min-height: 0;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 7px;
      padding: 14px 9px;
      border-right: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .88), rgba(246, 246, 249, .74));
      backdrop-filter: blur(26px) saturate(1.25);
    }

    .tool-chip {
      min-height: 68px;
      border: 1px solid transparent;
      border-radius: 17px;
      background: transparent;
      color: var(--ink);
      display: grid;
      place-items: center;
      gap: 6px;
      padding: 8px 4px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }

    .tool-chip:hover,
    .tool-chip.active {
      border-color: rgba(0, 113, 227, .24);
      background: rgba(0, 113, 227, .09);
      color: var(--accent);
      box-shadow: var(--inner-shadow);
    }

    .tool-chip strong {
      width: 36px;
      height: 36px;
      border-radius: 13px;
      background: rgba(118, 118, 128, .1);
      color: #4b5563;
      display: grid;
      place-items: center;
      font-size: 18px;
      line-height: 1;
    }

    .tool-chip.active strong {
      background: #fff;
      color: var(--accent);
      box-shadow: 0 6px 20px rgba(0, 113, 227, .14);
    }

    .tool-panel {
      min-height: 0;
      overflow: auto;
      background: rgba(250, 250, 252, .58);
    }

    .section h2 {
      margin: 0 0 16px;
      font-size: 25px;
      text-transform: none;
      letter-spacing: -.02em;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
    }

    .section h2 small {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      text-transform: none;
    }

    .search, .control {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255, 255, 255, .8);
      padding: 8px 10px;
      outline: none;
      color: var(--ink);
      box-shadow: var(--inner-shadow);
    }

    .search::placeholder,
    .control::placeholder {
      color: #9a9aa0;
    }

    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .upload-card {
      width: 100%;
      min-height: 112px;
      border: 1px dashed rgba(0, 0, 0, .18);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .96), rgba(247, 247, 250, .86));
      color: var(--ink);
      display: grid;
      grid-template-columns: 42px 1fr;
      align-items: center;
      gap: 12px;
      padding: 15px;
      text-align: left;
      box-shadow: var(--inner-shadow);
    }

    .upload-card:hover {
      border-color: rgba(0, 113, 227, .42);
      background: #fff;
      box-shadow: var(--soft-shadow);
    }

    .upload-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: linear-gradient(180deg, #eef6ff, #e4f0ff);
      color: var(--accent);
      display: grid;
      place-items: center;
      font-size: 22px;
      font-weight: 700;
    }

    .upload-card strong {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .upload-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .upload-icon .ri,
    .element-icon .ri,
    .tool-chip strong .ri {
      width: 20px;
      height: 20px;
    }

    .element-icon .ri {
      width: 22px;
      height: 22px;
    }

    .grid {
      display: grid;
      gap: 8px;
    }

    .grid.two {
      grid-template-columns: 1fr 1fr;
    }

    .element-group {
      display: grid;
      gap: 9px;
      margin-bottom: 14px;
    }

    .element-group:last-child {
      margin-bottom: 0;
    }

    .element-title {
      color: var(--ink);
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -.02em;
      margin: 8px 0 4px;
    }

    .element-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .element-card {
      min-height: 108px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .92), rgba(246, 246, 249, .76));
      color: var(--ink);
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      justify-items: center;
      gap: 10px;
      padding: 15px 10px;
      text-align: center;
      box-shadow: var(--inner-shadow);
    }

    .element-card:hover {
      background: #fff;
      border-color: rgba(0, 113, 227, .32);
      box-shadow: var(--soft-shadow);
      transform: translateY(-1px);
    }

    .element-icon {
      width: 40px;
      height: 40px;
      border-radius: 15px;
      background: linear-gradient(180deg, #eef6ff, #e5f0ff);
      color: var(--accent);
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 800;
    }

    .element-card strong {
      display: block;
      font-size: 14px;
      font-weight: 760;
      margin-bottom: 2px;
    }

    .element-card span:last-child {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .font-tools {
      display: grid;
      gap: 10px;
      margin-top: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .9), rgba(247, 247, 250, .72));
      box-shadow: var(--inner-shadow);
    }

    .font-tools-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .font-tools-head strong {
      color: var(--ink);
      font-size: 13px;
      font-weight: 760;
    }

    .font-tools-head small {
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }

    .preset-list {
      display: grid;
      gap: 8px;
      max-height: 315px;
      overflow: auto;
      padding-right: 4px;
    }

    .preset {
      text-align: left;
      border: 1px solid transparent;
      background: rgba(255, 255, 255, .72);
      border-radius: 14px;
      padding: 10px 11px;
      display: grid;
      gap: 3px;
    }

    .preset.active {
      border-color: rgba(0, 113, 227, .36);
      background: linear-gradient(180deg, #eef6ff, #e7f1ff);
      box-shadow: 0 0 0 1px rgba(0, 113, 227, .1) inset;
    }

    .preset strong {
      font-size: 13px;
      font-weight: 650;
    }

    .preset span {
      color: var(--muted);
      font-size: 12px;
    }

    .logo-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-height: 260px;
      overflow: auto;
      padding-right: 2px;
    }

    .logo-item {
      min-height: 92px;
      border: 1px solid var(--line);
      border-radius: 17px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .96), rgba(245, 245, 248, .82));
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 8px;
      padding: 10px;
      text-align: left;
      overflow: hidden;
      box-shadow: var(--inner-shadow);
    }

    .logo-item:hover {
      background: #fff;
      border-color: rgba(0, 113, 227, .24);
      box-shadow: var(--soft-shadow);
      transform: translateY(-1px);
    }

    .logo-item img {
      width: 100%;
      height: 48px;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, .08));
    }

    .logo-item span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stage-wrap {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 42px 1fr;
    }

    .stage-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(250, 250, 252, .72);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      backdrop-filter: blur(16px);
    }

    .stage {
      min-width: 0;
      min-height: 0;
      position: relative;
      overflow: auto;
      display: grid;
      place-items: center;
      padding: 32px;
      background:
        radial-gradient(circle at 50% 0, rgba(255, 255, 255, .92), transparent 34%),
        linear-gradient(135deg, #f1f2f6 0, #e8e9ef 100%);
    }

    .canvas-shell {
      position: relative;
      box-shadow: var(--shadow), 0 0 0 1px rgba(255, 255, 255, .7);
      background: white;
      line-height: 0;
      border-radius: 4px;
      overflow: visible;
    }

    .selection-overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .selection-box {
      position: absolute;
      border: 2px solid var(--accent);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, .86);
      pointer-events: none;
    }

    .selection-handle {
      position: absolute;
      width: 14px;
      height: 14px;
      margin: -7px 0 0 -7px;
      border: 2px solid var(--accent);
      border-radius: 5px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .16);
      pointer-events: auto;
    }

    .selection-handle[data-mode="resize"] {
      cursor: nwse-resize;
    }

    .selection-handle[data-mode="rotate"] {
      width: 18px;
      height: 18px;
      margin: -9px 0 0 -9px;
      border-radius: 50%;
      cursor: grab;
    }

    .inline-text-editor {
      position: absolute;
      z-index: 6;
      display: none;
      min-width: 44px;
      min-height: 34px;
      padding: 0;
      border: 2px solid var(--accent);
      border-radius: 8px;
      outline: none;
      background: rgba(255, 255, 255, .88);
      color: inherit;
      box-shadow: 0 10px 30px rgba(15, 23, 42, .16), 0 0 0 1px rgba(255, 255, 255, .86);
      resize: none;
      overflow: hidden;
      backdrop-filter: blur(14px) saturate(1.15);
    }

    .inline-text-editor.is-active {
      display: block;
    }

    .zoom-hud {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 5;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: rgba(255, 255, 255, .88);
      color: var(--ink);
      font-size: 12px;
      font-weight: 750;
      box-shadow: var(--inner-shadow), 0 8px 24px rgba(0, 0, 0, .1);
      backdrop-filter: blur(18px) saturate(1.2);
      pointer-events: none;
    }

    .zoom-hud span:last-child {
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }

    canvas {
      display: block;
      background: white;
      image-rendering: auto;
      touch-action: none;
    }

    .label {
      display: block;
      margin: 11px 0 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .toggle-row {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 12px 0 4px;
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, .66);
      color: var(--ink);
      font-size: 13px;
      font-weight: 650;
    }

    .toggle-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    input[type="color"] {
      width: 100%;
      padding: 2px;
      background: white;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-top: 8px;
    }

    .swatch {
      height: 26px;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, .2);
      box-shadow: 0 1px 2px rgba(0, 0, 0, .08);
    }

    .layers {
      display: grid;
      gap: 7px;
      max-height: 205px;
      overflow: auto;
    }

    .layer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid transparent;
      background: rgba(255, 255, 255, .76);
      border-radius: 12px;
      padding: 9px 10px;
      text-align: left;
      font-size: 12px;
      font-weight: 650;
    }

    .layer.active {
      border-color: rgba(0, 113, 227, .36);
      background: var(--accent-soft);
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .empty {
      padding: 12px;
      border: 1px dashed var(--line-strong);
      color: var(--muted);
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.45;
      background: rgba(255, 255, 255, .54);

    .inspector-body > .empty {
      margin: 12px;
    }

    .hidden { display: none !important; }

    @media (max-width: 1100px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100vh; }
      .workspace { grid-template-columns: 1fr; }

        display: block;
        border: 0;
        border-bottom: 1px solid var(--line);
      }
      .quick-tools {
        grid-template-columns: repeat(4, 1fr);
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .right { border: 0; border-bottom: 1px solid var(--line); }
      .stage { min-height: 520px; }

    /* Apple-grade desktop refresh. Kept as a scoped visual layer so existing editor logic stays intact. */
    :root {
      --bg: #f5f5f7;
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --muted-2: #a1a1a6;
      --panel: rgba(255, 255, 255, .72);
      --panel-solid: #ffffff;
      --panel-2: rgba(248, 248, 250, .86);
      --line: rgba(29, 29, 31, .08);
      --line-strong: rgba(29, 29, 31, .14);
      --accent: #0a84ff;
      --accent-soft: rgba(10, 132, 255, .12);
      --accent-softer: rgba(10, 132, 255, .07);
      --shadow: 0 44px 120px rgba(15, 23, 42, .16), 0 14px 38px rgba(15, 23, 42, .08);
      --soft-shadow: 0 18px 44px rgba(15, 23, 42, .08);
      --inner-shadow: inset 0 1px 0 rgba(255, 255, 255, .78);
      --radius: 11px;
      --ease: cubic-bezier(.22, 1, .36, 1);
    }

    body {
      background:
        radial-gradient(circle at 18% -8%, rgba(255, 255, 255, .98), transparent 31%),
        radial-gradient(circle at 72% 0%, rgba(220, 232, 246, .42), transparent 28%),
        linear-gradient(180deg, #fbfbfd 0%, #f4f4f6 46%, #ebecf0 100%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(29, 29, 31, .018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(29, 29, 31, .014) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: linear-gradient(to bottom, transparent, black 18%, black 78%, transparent);
    }

    .app {
      height: 100dvh;
      grid-template-rows: 64px minmax(0, 1fr);
    }

    .topbar {
      position: relative;
      padding: 0 18px;
      border-bottom-color: rgba(29, 29, 31, .075);
      background: rgba(246, 246, 248, .74);
      backdrop-filter: blur(34px) saturate(1.45);
      -webkit-backdrop-filter: blur(34px) saturate(1.45);
      box-shadow: var(--inner-shadow), 0 1px 0 rgba(255, 255, 255, .64);
    }

    .window-lights {
      display: inline-grid;
      grid-template-columns: repeat(3, 12px);
      gap: 8px;
      margin-right: 10px;
      align-items: center;
    }

    .window-lights i {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, .08);
    }

    .window-lights i:nth-child(1) { background: #ff5f57; }
    .window-lights i:nth-child(2) { background: #febc2e; }
    .window-lights i:nth-child(3) { background: #28c840; }

    .brand {
      align-items: center;
      gap: 8px;
      min-width: 330px;
    }

    .brand-copy {
      display: grid;
      gap: 1px;
      line-height: 1.05;
    }

    .brand strong {
      font-size: 14px;
      font-weight: 760;
      letter-spacing: .08em;
    }

    .brand span,
    .dim {
      font-size: 11px;
      color: rgba(29, 29, 31, .52);
      font-weight: 620;
    }

    .toolbar {
      gap: 7px;
      padding: 7px;
      border: 1px solid rgba(255, 255, 255, .66);
      border-radius: 18px;
      background: rgba(255, 255, 255, .52);
      box-shadow: var(--inner-shadow), 0 10px 26px rgba(15, 23, 42, .045);
    }

    .update-pill {
      min-height: 32px;
      max-width: 210px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 11px;
      border: 1px solid rgba(29, 29, 31, .075);
      border-radius: 999px;
      background: rgba(255, 255, 255, .58);
      color: rgba(29, 29, 31, .58);
      font-size: 11px;
      font-weight: 720;
      white-space: nowrap;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .72);
    }

    .update-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(29, 29, 31, .2);
    }

    .update-pill.is-checking::before,
    .update-pill.is-downloading::before {
      background: var(--accent);
      animation: breathe 1.4s var(--ease) infinite;
    }

    .update-pill.is-ready {
      border-color: var(--accent-border);
      background: rgba(255, 241, 0, .28);
      color: rgba(29, 29, 31, .86);
    }

    .update-pill.is-ready::before {
      background: var(--accent);
    }

    .btn,
    .icon-btn,
    .field,
    select,
    input[type="color"] {
      min-height: 32px;
      border-color: rgba(29, 29, 31, .09);
      border-radius: 10px;
      background: rgba(255, 255, 255, .76);
      transition: transform .22s var(--ease), background .22s var(--ease), border-color .22s var(--ease), box-shadow .22s var(--ease);
    }

    .field,
    select {
      color: rgba(29, 29, 31, .78);
      font-size: 12px;
      font-weight: 650;
      padding: 0 28px 0 10px;

    .btn,
    .icon-btn {

      font-weight: 720;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .72);
    }

    .btn:hover,
    .icon-btn:hover,
    .preset:hover,
    .layer:hover {

    .btn.primary {
      border-color: rgba(10, 132, 255, .58);
      background: linear-gradient(180deg, #1590ff, #0077ed);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .28), 0 12px 26px rgba(10, 132, 255, .24);
    }

    .workspace {
      grid-template-columns: 392px minmax(540px, 1fr) 336px;
      background: rgba(246, 246, 248, .28);
    }

    aside {
      background: rgba(246, 246, 248, .62);
      backdrop-filter: blur(28px) saturate(1.32);

    }

    .left {

      border-right-color: rgba(29, 29, 31, .07);

    .right {
      border-left-color: rgba(29, 29, 31, .07);

    }

    .quick-tools {
      gap: 8px;
      padding: 12px 8px;
      border-right-color: rgba(29, 29, 31, .065);
      background: rgba(255, 255, 255, .48);
    }

    .tool-chip {
      min-height: 58px;
      border-radius: 16px;
      padding: 7px 3px;

      font-size: 11px;

    }

    .tool-chip:hover,
    .tool-chip.active {
      border-color: rgba(10, 132, 255, .18);

    }

    .tool-chip.active strong {

    }

    .tool-panel {
      background: rgba(250, 250, 252, .46);
    }

    .section {
      padding: 20px 18px 22px;
      border-bottom-color: rgba(29, 29, 31, .07);
    }

    .section h2,
    .element-title {
      color: rgba(29, 29, 31, .92);
      font-size: 18px;
      font-weight: 760;
      letter-spacing: -.018em;
    }

    .section h2 small {
      color: rgba(29, 29, 31, .45);
      font-size: 11px;
      font-weight: 650;
    }

    .search,
    .control {
      min-height: 38px;
      border-color: rgba(29, 29, 31, .075);
      border-radius: 13px;
      background: rgba(255, 255, 255, .76);
      font-size: 13px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .74), 0 8px 22px rgba(15, 23, 42, .035);
    }

    .preset-list {
      max-height: 342px;
      gap: 7px;
      margin-top: 10px;
    }

    .preset,
    .layer {
      border-color: rgba(29, 29, 31, .055);
      border-radius: 13px;
      background: rgba(255, 255, 255, .54);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .58);
    }

    .preset {
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 10px 12px;
    }

    .preset strong,
    .layer {
      font-size: 12px;
      font-weight: 690;
    }

    .preset span {
      grid-column: 1 / -1;
      font-size: 11px;
      color: rgba(29, 29, 31, .48);
    }

    .preset.active,
    .layer.active {
      border-color: rgba(10, 132, 255, .28);

      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .54);

    .upload-card,
    .element-card,
    .font-tools,
    .logo-item,
    .toggle-row,
    .mini-btn {
      border-color: rgba(29, 29, 31, .075);

    }

    .upload-card {
      min-height: 104px;

    }

    .upload-icon,
    .element-icon {

    .element-grid {

      border-radius: 19px;

    }

    .element-card:hover,
    .logo-item:hover,
    .upload-card:hover {
      border-color: rgba(10, 132, 255, .24);
      background: rgba(255, 255, 255, .92);

    .logo-list {

    .logo-item {

    .stage-wrap {

    .stage-info {
      padding: 0 18px;
      border-bottom-color: rgba(29, 29, 31, .06);
      background: rgba(250, 250, 252, .42);

    .stage-info span:first-child {

    .stage-info span:first-child::before {

      display: inline-block;

      height: 7px;

      border-radius: 50%;

    .stage {
      padding: 42px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, .9), transparent 30%),

    .canvas-shell {

    canvas {

    }

    .selection-box {

    .selection-handle {

    .compact-field textarea:focus,

    .inline-control {
      grid-template-columns: 52px minmax(0, 1fr) 42px;
      color: rgba(29, 29, 31, .54);
      font-size: 11px;
    }

    input[type="range"] {

    }

    .swatch {
      height: 24px;
      border-radius: 999px;
      border-color: rgba(29, 29, 31, .16);
    }

    .empty {
      border-color: rgba(29, 29, 31, .12);
      border-radius: 15px;
      background: rgba(255, 255, 255, .46);
      color: rgba(29, 29, 31, .52);
    }

      0%, 100% { transform: scale(1); opacity: .82; }

    /* YOUXIAKE yellow theme */
    :root {
      --accent: #fff100;
      --accent-ink: #1d1d1f;
      --accent-soft: rgba(255, 241, 0, .24);

        linear-gradient(180deg, rgba(255, 255, 255, .36), rgba(255, 255, 255, 0)),

    .inspector-title::after {
      content: "Properties";

      padding: 4px 8px;
      border: 1px solid rgba(29, 29, 31, .08);
      border-radius: 999px;
      background: rgba(255, 255, 255, .58);

      font-size: 10px;
      font-weight: 720;
      letter-spacing: .02em;

    .inspector-subtitle {

      border-radius: 999px;
      background: rgba(255, 255, 255, .58);

    .right.has-selection .inspector-subtitle {

    .inspector-body {
      display: block;
      min-height: 0;
      overflow: auto;
      padding: 12px;
      scrollbar-width: thin;
    }

    .inspector-body > .empty {
      margin: 0;
      min-height: 92px;
      display: grid;
      align-content: center;
      border-style: solid;
      border-color: rgba(29, 29, 31, .07);
      background:
        linear-gradient(135deg, rgba(255, 241, 0, .12), transparent 42%),
        rgba(255, 255, 255, .58);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .68), 0 18px 36px rgba(15, 23, 42, .045);
    }

    #propsPanel {
      display: grid;
      gap: 10px;
    }

    .inspector-group {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(29, 29, 31, .065);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .82), rgba(255, 255, 255, .58));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .76), 0 14px 30px rgba(15, 23, 42, .045);
    }

    .inspector-group::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: transparent;
      transition: background .2s var(--ease);
    }

    .right.has-selection #propsPanel .inspector-group:first-child::before,
    .inspector-group:hover::before {
      background: var(--accent);
    }

    .inspector-group-title {
      min-height: 46px;
      padding: 0 12px 0 14px;
      cursor: pointer;
      user-select: none;
      color: rgba(29, 29, 31, .82);
      font-size: 12px;
      letter-spacing: .01em;
    }

    .inspector-group-title span:first-child {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .inspector-group-title span:first-child::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: rgba(29, 29, 31, .16);
      box-shadow: inset 0 0 0 1px rgba(29, 29, 31, .05);
    }

    .inspector-group:nth-child(1) .inspector-group-title span:first-child::before,
    #propsPanel + .inspector-group .inspector-group-title span:first-child::before {
      background: var(--accent);
    }

    .inspector-toggle {
      width: 24px;
      height: 24px;
      border: 1px solid rgba(29, 29, 31, .07);
      border-radius: 9px;
      display: grid;
      place-items: center;
      color: rgba(29, 29, 31, .52);
      background: rgba(255, 255, 255, .56);
      transition: transform .2s var(--ease), background .2s var(--ease);
    }

    .inspector-toggle svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
      transform: rotate(90deg);
      transition: transform .2s var(--ease);
    }

    .inspector-group.collapsed .inspector-toggle svg {
      transform: rotate(0deg);
    }

    .inspector-group.collapsed .inspector-content {
      display: none;
    }

    .inspector-content {
      gap: 12px;
      padding: 0 12px 14px 14px;
    }

    .field-grid {
      gap: 9px;
    }

    .field-grid.four {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .compact-field {
      position: relative;
    }

    .compact-field label {
      margin-bottom: 6px;
      color: rgba(29, 29, 31, .5);
      font-size: 10px;
      letter-spacing: .04em;
    }

    .compact-field input,
    .compact-field select,
    .compact-field textarea {
      min-height: 36px;
      border-color: rgba(29, 29, 31, .075);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .9), rgba(255, 255, 255, .62));
      color: rgba(29, 29, 31, .9);
      font-size: 12px;
      font-weight: 650;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .72);
    }

    .compact-field input[type="color"] {
      height: 38px;
      padding: 3px;
      border-radius: 13px;
    }

    .compact-field textarea {
      min-height: 86px;
      line-height: 1.45;
    }

    .toggle-row {
      min-height: 58px;
      margin: 0;
      border-radius: 14px;
      background:
        linear-gradient(135deg, rgba(255, 241, 0, .14), rgba(255, 255, 255, .66));
      font-size: 12px;
    }

    .toggle-row input {
      width: 28px;
      height: 18px;
      appearance: none;
      border-radius: 999px;
      background: rgba(29, 29, 31, .18);
      position: relative;
      transition: background .18s var(--ease);
    }

    .toggle-row input::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 6px rgba(15, 23, 42, .18);
      transition: transform .18s var(--ease);
    }

    .toggle-row input:checked {
      background: #d6ca00;
    }

    .toggle-row input:checked::after {
      transform: translateX(10px);
    }

    .button-row {
      gap: 7px;
    }

    .mini-btn {
      min-height: 36px;
      border-color: rgba(29, 29, 31, .075);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .86), rgba(255, 255, 255, .6));
      color: rgba(29, 29, 31, .74);
    }

    .mini-btn .ri {
      width: 15px;
      height: 15px;
      opacity: .78;
    }

    .mini-btn:hover {
      border-color: var(--accent-border);
      background: rgba(255, 255, 255, .94);
      color: rgba(29, 29, 31, .9);
    }

    .mini-btn.active {
      border-color: var(--accent-border);
      background: var(--accent);
      color: rgba(29, 29, 31, .92);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .72), 0 10px 20px var(--accent-shadow);
    }

    .mini-btn.active .ri {
      opacity: 1;
    }

    .inline-control {
      grid-template-columns: 58px minmax(0, 1fr) 44px;
      min-height: 38px;
      padding: 9px 10px;
      border: 1px solid rgba(29, 29, 31, .06);
      border-radius: 14px;
      background: rgba(255, 255, 255, .5);
    }

    .inline-control output {
      padding: 3px 6px;
      border-radius: 999px;
      background: rgba(29, 29, 31, .055);
      color: rgba(29, 29, 31, .74);
      font-size: 10px;
      font-weight: 760;
    }

    input[type="range"] {
      height: 4px;
    }

    .swatches {
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .swatch {
      height: 28px;
      border: 2px solid rgba(255, 255, 255, .9);
      box-shadow: 0 0 0 1px rgba(29, 29, 31, .12), 0 5px 12px rgba(15, 23, 42, .06);
    }

    .layers {
      max-height: 255px;
      gap: 8px;
    }

    .layer {
      min-height: 40px;
      border-radius: 13px;
      padding: 8px 9px 8px 11px;
    }

    .layer span:last-child {
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(29, 29, 31, .055);
      color: rgba(29, 29, 31, .48);
      font-size: 10px;
      text-transform: capitalize;
    }

    .layer.active span:last-child {
      background: rgba(255, 255, 255, .66);
      color: rgba(29, 29, 31, .72);
    }

    .right:not(.has-selection) #propsPanel {
      display: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="window-lights" aria-hidden="true"><i></i><i></i><i></i></span>
        <span class="brand-copy">
          <strong>YOUDESIGN</strong>
          <span id="currentSizeLabel">1080 × 1440</span>
        </span>
      </div>
      <div class="toolbar">
        <button class="icon-btn" id="undoBtn" title="撤销">↶</button>
        <button class="icon-btn" id="redoBtn" title="重做">↷</button>
        <button class="icon-btn" id="duplicateBtn" title="复制">⧉</button>
        <button class="icon-btn" id="deleteBtn" title="删除">⌫</button>
        <select id="zoomSelect" class="field" title="缩放">
          <option value="fit">适配</option>
          <option value="custom" hidden>100%</option>
          <option value="0.25">25%</option>
          <option value="0.5">50%</option>
          <option value="0.75">75%</option>
          <option value="1">100%</option>
        </select>
        <select id="exportScale" class="field" title="导出倍率">
          <option value="1">1x</option>
          <option value="2" selected>2x</option>
        </select>
        <select id="exportType" class="field" title="导出格式">
          <option value="image/png">PNG</option>
          <option value="image/jpeg">JPG</option>
        </select>
        <button class="btn" id="checkUpdateBtn" type="button">检查更新</button>
        <button class="btn primary hidden" id="installUpdateBtn" type="button">重启安装</button>
        <span class="update-pill hidden" id="updateStatus">已是最新</span>
        <button class="btn" id="importProjectBtn" type="button">导入工程</button>
        <button class="btn" id="exportProjectBtn" type="button">导出工程</button>
        <button class="btn primary" id="exportBtn">导出图片</button>
        <input class="file-input" id="projectInput" type="file" accept=".youdesign,application/json">
      </div>
    </header>

    <main class="workspace">
      <aside class="left">
        <nav class="quick-tools" id="quickTools" aria-label="编辑工具栏">
          <button class="tool-chip active" type="button" data-scroll="sizeSection"><strong>▣</strong><span>尺寸</span></button>
          <button class="tool-chip" type="button" data-scroll="addSection"><strong>＋</strong><span>添加</span></button>
          <button class="tool-chip" type="button" data-action="upload"><strong>▧</strong><span>图片</span></button>
          <button class="tool-chip" type="button" data-scroll="textTools"><strong>T</strong><span>文字</span></button>
          <button class="tool-chip" type="button" data-scroll="mascotPanel"><strong>侠</strong><span>素材</span></button>
          <button class="tool-chip" type="button" data-scroll="shapeTools"><strong>△</strong><span>绘制</span></button>
          <button class="tool-chip" type="button" data-scroll="logoSection"><strong>◆</strong><span>Logo</span></button>
        </nav>

        <div class="tool-panel">
        <section class="section" id="sizeSection">
          <h2>尺寸 <small>平台预设</small></h2>
          <input class="search" id="presetSearch" placeholder="搜索平台或尺寸，例如 朋友圈 / 1080">
          <div class="preset-list" id="presetList"></div>
          <button class="btn" id="newBlankBtn" type="button" style="width: 100%; margin-top: 12px;">新建空白画布</button>
        </section>

        <section class="section" id="addSection">
          <h2>添加元素 <small>常用组件</small></h2>
          <label class="label" for="imageInput">上传图片</label>
          <button class="upload-card" id="imageUploadBtn" type="button">
            <span class="upload-icon">+</span>
            <span>
              <strong id="imageUploadTitle">上传图片</strong>
              <span id="imageUploadMeta">支持 JPG、PNG、WebP，上传后自动放入画布</span>
            </span>
          </button>
          <input class="file-input" id="imageInput" type="file" accept="image/*">
          <div class="element-group" id="textTools">
            <p class="element-title">文字</p>
            <div class="element-grid">
              <button class="element-card" id="addTitleBtn" type="button"><span class="element-icon">H</span><span><strong>标题</strong><span>封面主视觉</span></span></button>
              <button class="element-card" id="addTextBtn" type="button"><span class="element-icon">T</span><span><strong>文字</strong><span>普通说明文字</span></span></button>
              <button class="element-card" id="addSubtitleBtn" type="button"><span class="element-icon">S</span><span><strong>副标题</strong><span>补充说明</span></span></button>
              <button class="element-card" id="addBigNumberBtn" type="button"><span class="element-icon">7</span><span><strong>大数字</strong><span>清单/步骤</span></span></button>
              <button class="element-card" id="addVerticalTextBtn" type="button"><span class="element-icon">竖</span><span><strong>竖排字</strong><span>边栏标题</span></span></button>
            </div>
            <div class="font-tools" id="fontSection">
              <div class="font-tools-head">
                <strong>字体</strong>
                <small id="fontStatus">内置字体</small>
              </div>
              <div class="grid">
                <button class="btn" id="localFontsBtn">读取本地字体</button>
              </div>
              <p class="hint">只显示白名单中的免费商用字体和字魂字体，其他本地字体会自动过滤。</p>
            </div>
          </div>
          <div class="element-group">
            <p class="element-title">标签</p>
            <div class="element-grid">
              <button class="element-card" id="showMascotsBtn" type="button"><span class="element-icon">侠</span><span><strong>游小侠贴纸</strong><span>选择吉祥物</span></span></button>
              <button class="element-card" id="addPillTagBtn" type="button"><span class="element-icon">●</span><span><strong>胶囊标签</strong><span>收藏/攻略</span></span></button>
              <button class="element-card" id="addCornerBadgeBtn" type="button"><span class="element-icon">⌜</span><span><strong>角标</strong><span>右上强调</span></span></button>
              <button class="element-card" id="addTopBadgeBtn" type="button"><span class="element-icon">TOP</span><span><strong>数字标签</strong><span>TOP / 必看</span></span></button>
            </div>
          </div>
          <div class="element-group" id="mascotPanel">
            <p class="element-title">游小侠贴纸</p>
            <div class="logo-list" id="mascotList">
              <div class="empty">正在读取游小侠素材...</div>
            </div>
          </div>
          <div class="element-group" id="shapeTools">
            <p class="element-title">图形</p>
            <div class="element-grid">
              <button class="element-card" id="addRectBtn" type="button"><span class="element-icon">▭</span><span><strong>矩形</strong><span>色块/底板</span></span></button>
              <button class="element-card" id="addCircleBtn" type="button"><span class="element-icon">○</span><span><strong>圆形</strong><span>装饰重点</span></span></button>
              <button class="element-card" id="addDividerBtn" type="button"><span class="element-icon">—</span><span><strong>分割线</strong><span>标题下划线</span></span></button>
              <button class="element-card" id="addOverlayBtn" type="button"><span class="element-icon">▣</span><span><strong>遮罩</strong><span>压暗背景</span></span></button>
            </div>
          </div>
        </section>

        <section class="section" id="logoSection">
          <h2>Logo <small>点击加入画布</small></h2>
          <div class="logo-list" id="logoList">
            <div class="empty">正在读取 logo 素材...</div>
          </div>
        </section>

        </div>
      </aside>

      <section class="stage-wrap">
        <div class="stage-info">
          <span id="docInfo">小红书 · 图文竖版封面 · 1080 × 1440</span>
          <span>拖拽移动，右下角缩放，Shift 临时切换等比例</span>
        </div>

          <div class="canvas-shell">
            <canvas id="canvas"></canvas>
            <div class="selection-overlay" id="selectionOverlay"></div>
            <textarea class="inline-text-editor" id="inlineTextEditor" aria-label="直接编辑文字"></textarea>
          </div>
          <div class="zoom-hud" title="按住 Alt 并滚动鼠标滚轮缩放画布">
            <strong id="zoomPercent">100%</strong>
            <span>Alt + 滚轮</span>
          </div>
        </div>
      </section>

      <aside class="right">
        <div class="inspector-header">
          <h2 class="inspector-title">设计</h2>
          <span class="inspector-subtitle" id="selectionLabel">未选中</span>
        </div>
        <div class="inspector-body">
          <div id="emptyPanel" class="empty">选择画布上的文字、图片或图形后，在这里调整样式。</div>
          <div id="propsPanel" class="hidden">
            <div class="inspector-group">
              <div class="inspector-group-title"><span>位置</span></div>
              <div class="inspector-content">
                <div class="field-grid four">
                  <div class="compact-field"><label for="posX">X</label><input id="posX" type="number" step="1"></div>
                  <div class="compact-field"><label for="posY">Y</label><input id="posY" type="number" step="1"></div>
                  <div class="compact-field"><label for="objWidth">W</label><input id="objWidth" type="number" min="1" step="1"></div>
                  <div class="compact-field"><label for="objHeight">H</label><input id="objHeight" type="number" min="1" step="1"></div>

                </div>
                <div class="button-row three">
                  <button class="mini-btn" id="alignLeftBtn" type="button">左对齐</button>
                  <button class="mini-btn" id="alignCenterBtn" type="button">居中</button>
                  <button class="mini-btn" id="alignRightBtn" type="button">右对齐</button>
                </div>
              </div>
            </div>

            <div class="inspector-group" id="textGroup">
              <div class="inspector-group-title"><span>文字</span></div>
              <div class="inspector-content">
                <div class="compact-field">
                  <label id="textValueLabel" for="textValue">内容</label>
                  <textarea id="textValue" rows="3"></textarea>
                </div>
                <div class="field-grid">
                  <div class="compact-field">
                    <label for="fontFamily">字体</label>
                    <select id="fontFamily"></select>
                  </div>
                  <div class="compact-field">
                    <label for="fontSize">字号</label>
                    <input id="fontSize" type="number" min="8" max="320">
                  </div>
                </div>
                <div class="button-row three">
                  <button class="mini-btn" id="textAlignLeftBtn" type="button">左对齐</button>
                  <button class="mini-btn" id="textAlignCenterBtn" type="button">居中</button>
                  <button class="mini-btn" id="textAlignRightBtn" type="button">右对齐</button>
                </div>
              </div>
            </div>

            <div class="inspector-group" id="appearanceGroup">
              <div class="inspector-group-title"><span>外观</span></div>
              <div class="inspector-content">
                <div class="field-grid" id="appearanceGrid">
                  <div class="compact-field">
                    <label id="fillColorLabel" for="fillColor">颜色</label>
                    <input id="fillColor" type="color">
                  </div>
                  <div class="compact-field">
                    <label id="strokeColorLabel" for="strokeColor">描边</label>
                    <input id="strokeColor" type="color">
                  </div>
                </div>
                <div class="inline-control">
                  <label for="strokeWidth">描边</label>
                  <input id="strokeWidth" type="range" min="0" max="18" step="1">
                  <output id="strokeWidthValue">0</output>
                </div>
                <div class="inline-control hidden" id="shapeRadiusControl">
                  <label for="shapeRadius">圆角</label>
                  <input id="shapeRadius" type="range" min="0" max="160" step="1">
                  <output id="shapeRadiusValue">0</output>
                </div>
                <div class="button-row two hidden" id="shapeRadiusPresets">
                  <button class="mini-btn" id="radiusStraightBtn" type="button">直角</button>
                  <button class="mini-btn" id="radiusRoundBtn" type="button">圆角</button>
                </div>
                <div class="inline-control">
                  <label for="opacity">透明度</label>
                  <input id="opacity" type="range" min="0.05" max="1" step="0.05">
                  <output id="opacityValue">100%</output>
                </div>
                <div class="inline-control">
                  <label for="shadow">阴影</label>
                  <input id="shadow" type="range" min="0" max="36" step="1">
                  <output id="shadowValue">0</output>
                </div>
              </div>
            </div>

            <div class="inspector-group">
              <div class="inspector-group-title"><span>图层</span></div>
              <div class="inspector-content">
                <div class="button-row">
                  <button class="mini-btn" id="bringForwardBtn">上移</button>
                  <button class="mini-btn" id="sendBackwardBtn">下移</button>
                  <button class="mini-btn" id="bringFrontBtn">置顶</button>
                  <button class="mini-btn" id="sendBackBtn">置底</button>
                </div>
              </div>
            </div>
          </div>

          <div class="inspector-group">
            <div class="inspector-group-title"><span>背景</span></div>
            <div class="inspector-content">
              <div class="compact-field">
                <label for="backgroundColor">画布颜色</label>
                <input id="backgroundColor" type="color" value="#fff6d8">
              </div>
              <div class="swatches" id="swatches"></div>
            </div>
          </div>

          <div class="inspector-group">
            <div class="inspector-group-title"><span>图层</span></div>
            <div class="inspector-content">
              <div class="layers" id="layers"></div>
            </div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script>

    async function restore(raw) {
      const parsed = JSON.parse(raw);
      const data = parsed && parsed.schema === "youdesign.project" ? parsed.document : parsed;
      if (!data || !Array.isArray(data.objects) || !Number(data.width) || !Number(data.height)) {
        throw new Error("工程文件格式不正确");
      }
      Object.assign(state, data);
      state.objects = await Promise.all(data.objects.map(async o => {
        if (o.type === "image" && o.src) {
          o.image = await loadImage(o.src);
        }
        return o;
      }));
      setSelection([]);

      renderAll();
      syncUi();

    function downloadTextFile(content, filename, type = "application/json") {
      const blob = new Blob([content], { type });

      a.href = URL.createObjectURL(blob);

      a.click();
      URL.revokeObjectURL(a.href);

    function readTextFile(file) {

      });

      document.getElementById("docInfo").textContent = `${state.platform} · ${state.label} · ${state.width} × ${state.height}`;
    }

    function applyZoom() {
      const value = document.getElementById("zoomSelect").value;
      let scale = value === "custom" ? state.zoomScale : Number(value);
      if (value === "fit") {
        const availableW = Math.max(320, stage.clientWidth - 82);
        const availableH = Math.max(320, stage.clientHeight - 82);
        scale = Math.min(availableW / state.width, availableH / state.height, 1);
      }
      setCanvasScale(scale, value);
    }

    function setCanvasScale(scale, mode = "custom") {
      const nextScale = Math.max(.1, Math.min(3, scale));
      state.zoom = mode;
      state.zoomScale = nextScale;
      canvas.style.width = `${state.width * nextScale}px`;
      canvas.style.height = `${state.height * nextScale}px`;
      const label = `${Math.round(nextScale * 100)}%`;
      document.getElementById("zoomPercent").textContent = label;
      document.querySelector('#zoomSelect option[value="custom"]').textContent = label;
    }

    function getScale() {
      return canvas.width / canvas.getBoundingClientRect().width;
    }

    function selected() {
      return state.objects.find(o => o.id === state.selectedId);
    }

    function selectedObjects() {
      const ids = new Set(state.selectedIds && state.selectedIds.length ? state.selectedIds : state.selectedId ? [state.selectedId] : []);
      return state.objects.filter(o => ids.has(o.id));
    }

    function setSelection(ids) {
      state.selectedIds = [...new Set(ids)].filter(id => state.objects.some(o => o.id === id));
      state.selectedId = state.selectedIds[state.selectedIds.length - 1] || null;
    }

    function toggleSelection(id) {
      const ids = new Set(state.selectedIds && state.selectedIds.length ? state.selectedIds : state.selectedId ? [state.selectedId] : []);
      if (ids.has(id)) ids.delete(id);
      else ids.add(id);
      setSelection([...ids]);
    }

    function selectionBounds(objects = selectedObjects()) {
      if (!objects.length) return null;
      const left = Math.min(...objects.map(o => o.x));
      const top = Math.min(...objects.map(o => o.y));
      const right = Math.max(...objects.map(o => o.x + o.width));
      const bottom = Math.max(...objects.map(o => o.y + o.height));
      return { x: left, y: top, width: right - left, height: bottom - top, right, bottom };
    }

    function renderAll(exporting = false, scale = 1, targetCtx = ctx) {
      targetCtx.save();
      targetCtx.setTransform(scale, 0, 0, scale, 0, 0);
      targetCtx.clearRect(0, 0, state.width, state.height);
      targetCtx.fillStyle = state.background;
      targetCtx.fillRect(0, 0, state.width, state.height);
      drawSafeZones(targetCtx, exporting);
      for (const obj of state.objects) drawObject(targetCtx, obj);
      targetCtx.restore();
      if (!exporting) renderSelectionOverlay();

    function finishInlineTextEdit(commit = true) {
      if (!inlineEditing) return;
      const obj = state.objects.find(item => item.id === inlineEditing.id);
      const nextText = inlineTextEditor.value;
      if (commit && obj && obj.type === "text" && nextText !== inlineEditing.original) {
        saveHistory();
        obj.text = nextText || " ";
        obj.name = obj.text.split("\n")[0].slice(0, 10) || "文字";
        renderAll();
        syncUi();
        persist();
      }
      hideInlineTextEditor();

      const scale = canvas.getBoundingClientRect().width / state.width;
      const lineHeight = obj.fontSize * 1.14 * scale;
      inlineEditing = { id: obj.id, original: obj.text || "" };
      inlineTextEditor.value = obj.text || "";
      inlineTextEditor.style.left = `${obj.x * scale}px`;
      inlineTextEditor.style.top = `${obj.y * scale}px`;
      inlineTextEditor.style.width = `${Math.max(44, obj.width * scale)}px`;
      inlineTextEditor.style.height = `${Math.max(34, obj.height * scale)}px`;
      inlineTextEditor.style.font = `${obj.fontWeight || 800} ${obj.fontSize * scale}px "${obj.fontFamily}", sans-serif`;
      inlineTextEditor.style.lineHeight = `${lineHeight}px`;
      inlineTextEditor.style.color = obj.fill || "#171411";
      inlineTextEditor.style.textAlign = obj.align || "left";
      inlineTextEditor.style.opacity = String(obj.opacity ?? 1);
      inlineTextEditor.style.transformOrigin = "50% 50%";
      inlineTextEditor.style.transform = `rotate(${obj.rotation || 0}deg)`;
      inlineTextEditor.classList.add("is-active");
      inlineTextEditor.focus();
      inlineTextEditor.select();
      inlineTextEditor.onblur = () => finishInlineTextEdit(true);
      inlineTextEditor.onkeydown = event => {
        if (event.key === "Escape") {
          event.preventDefault();
          finishInlineTextEdit(false);
        }
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
          event.preventDefault();
          finishInlineTextEdit(true);
        }
      };
    }

    function drawSafeZones(c, exporting) {
      if (exporting) return;
      c.save();
      c.strokeStyle = "rgba(37,99,235,.32)";
      c.setLineDash([12, 12]);
      c.lineWidth = 3;
      if (state.platform.includes("抖音") || state.platform.includes("视频号")) {
        c.strokeRect(60, 228, state.width - 120, state.height - 456);
      }
      if (state.label.includes("相册封面")) {
        c.strokeRect(state.width - 430, state.height - 330, 260, 260);
      }
      c.restore();
    }

    function drawObject(c, obj) {
      c.save();
      c.globalAlpha = obj.opacity ?? 1;
      c.translate(obj.x + obj.width / 2, obj.y + obj.height / 2);
      c.rotate((obj.rotation || 0) * Math.PI / 180);
      c.translate(-obj.width / 2, -obj.height / 2);
      if (obj.shadow) {
        c.shadowColor = "rgba(0,0,0,.22)";
        c.shadowBlur = obj.shadow;
        c.shadowOffsetX = obj.shadow / 3;
        c.shadowOffsetY = obj.shadow / 3;
      }
      if (obj.type === "text") drawText(c, obj);
      if (obj.type === "shape") drawShape(c, obj);
      if (obj.type === "image" && obj.image) drawImage(c, obj);
      c.restore();
    }

    function drawText(c, obj) {
      c.font = `${obj.fontWeight || 800} ${obj.fontSize}px "${obj.fontFamily}", sans-serif`;
      c.textAlign = obj.align || "left";
      c.textBaseline = "top";
      c.lineJoin = "round";
      const lines = wrapText(c, obj.text, obj.width, obj.fontSize * 1.12);
      const lineHeight = obj.fontSize * 1.14;
      obj.height = Math.max(lineHeight, lines.length * lineHeight);
      lines.forEach((line, i) => {
        const x = obj.align === "center" ? obj.width / 2 : obj.align === "right" ? obj.width : 0;
        const y = i * lineHeight;
        if (obj.strokeWidth > 0) {
          c.strokeStyle = obj.stroke;
          c.lineWidth = obj.strokeWidth;
          c.strokeText(line, x, y);
        }
        c.fillStyle = obj.fill;
        c.fillText(line, x, y);
      });
    }

    function wrapText(c, value, maxWidth, baseSize) {
      const hardLines = String(value || "").split("\n");
      const result = [];
      hardLines.forEach(line => {
        let current = "";
        for (const ch of line) {
          const test = current + ch;
          if (c.measureText(test).width > maxWidth && current) {
            result.push(current);
            current = ch;
          } else {
            current = test;
          }
        }
        result.push(current || " ");
      });
      return result;
    }

    function roundRect(c, x, y, w, h, r) {
      const radius = Math.min(r || 0, w / 2, h / 2);
      c.beginPath();
      c.moveTo(x + radius, y);
      c.arcTo(x + w, y, x + w, y + h, radius);
      c.arcTo(x + w, y + h, x, y + h, radius);
      c.arcTo(x, y + h, x, y, radius);
      c.arcTo(x, y, x + w, y, radius);
      c.closePath();
    }

    function drawShape(c, obj) {
      c.fillStyle = obj.fill;
      c.strokeStyle = obj.stroke || obj.fill;
      c.lineWidth = obj.strokeWidth || 0;
      if (obj.kind === "circle") {
        c.beginPath();
        c.ellipse(obj.width / 2, obj.height / 2, obj.width / 2, obj.height / 2, 0, 0, Math.PI * 2);
      } else {
        roundRect(c, 0, 0, obj.width, obj.height, obj.radius);
      }
      c.fill();
      if (obj.strokeWidth > 0) c.stroke();
    }

    function drawImage(c, obj) {
      roundRect(c, 0, 0, obj.width, obj.height, obj.radius || 0);
      c.clip();
      c.drawImage(obj.image, 0, 0, obj.width, obj.height);
    }

    function drawSelection(c, obj) {
      c.save();
      c.translate(obj.x + obj.width / 2, obj.y + obj.height / 2);
      c.rotate((obj.rotation || 0) * Math.PI / 180);
      c.translate(-obj.width / 2, -obj.height / 2);
      c.strokeStyle = "#2563eb";
      c.lineWidth = 3;
      c.setLineDash([10, 6]);
      c.strokeRect(0, 0, obj.width, obj.height);
      c.setLineDash([]);
      c.fillStyle = "#ffffff";
      c.strokeStyle = "#2563eb";
      handlePoints(obj).forEach(p => {
        c.beginPath();
        c.rect(p.x - 8, p.y - 8, 16, 16);
        c.fill();
        c.stroke();
      });
      c.beginPath();
      c.arc(obj.width / 2, -34, 10, 0, Math.PI * 2);
      c.fill();
      c.stroke();
      c.restore();
    }

    function renderSelectionOverlay() {
      const objects = selectedObjects();
      selectionOverlay.innerHTML = "";
      if (!objects.length) return;
      const scale = canvas.getBoundingClientRect().width / state.width;
      const makeBox = (bounds, className = "selection-box") => {
        const box = document.createElement("div");
        box.className = className;
        box.style.left = `${bounds.x * scale}px`;
        box.style.top = `${bounds.y * scale}px`;
        box.style.width = `${bounds.width * scale}px`;
        box.style.height = `${bounds.height * scale}px`;
        selectionOverlay.appendChild(box);
      };
      objects.forEach(obj => makeBox(obj));
      const bounds = selectionBounds(objects);
      if (!bounds) return;
      const handlePoints = [
        { mode: "resize", name: "se", x: bounds.x + bounds.width, y: bounds.y + bounds.height },
        { mode: "rotate", name: "rotate", x: bounds.x + bounds.width / 2, y: bounds.y - 34 }
      ];
      handlePoints.forEach(point => {
        const handle = document.createElement("button");
        handle.type = "button";
        handle.className = "selection-handle";
        handle.dataset.mode = point.mode;
        handle.dataset.name = point.name;
        handle.style.left = `${point.x * scale}px`;
        handle.style.top = `${point.y * scale}px`;
        handle.title = point.mode === "resize" ? "缩放" : "旋转";
        selectionOverlay.appendChild(handle);
      });
    }

    function handlePoints(obj) {
      return [
        { name: "nw", x: 0, y: 0 },
        { name: "ne", x: obj.width, y: 0 },
        { name: "se", x: obj.width, y: obj.height },
        { name: "sw", x: 0, y: obj.height }
      ];
    }

    function toLocalPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const scale = getScale();
      return {
        x: (event.clientX - rect.left) * scale,
        y: (event.clientY - rect.top) * scale
      };
    }

    function hitTest(point) {
      for (let i = state.objects.length - 1; i >= 0; i--) {
        const obj = state.objects[i];
        if (point.x >= obj.x && point.x <= obj.x + obj.width && point.y >= obj.y && point.y <= obj.y + obj.height) return obj;
      }
      return null;
    }

    function hitHandle(point, obj) {
      if (!obj) return null;
      const handles = [
        { mode: "resize", name: "se", x: obj.x + obj.width, y: obj.y + obj.height },
        { mode: "rotate", name: "rotate", x: obj.x + obj.width / 2, y: obj.y - 34 }
      ];
      return handles.find(h => Math.hypot(point.x - h.x, point.y - h.y) < 22);
    }

    selectionOverlay.addEventListener("pointerdown", e => {
      const handle = e.target.closest(".selection-handle");
      if (!handle) return;
      const objects = selectedObjects();
      if (!objects.length) return;
      e.preventDefault();
      const p = toLocalPoint(e);
      state.dragging = {
        mode: handle.dataset.mode,
        start: p,
        obj: selected() ? { ...selected() } : null,
        objects: objects.map(o => ({ ...o })),
        bounds: selectionBounds(objects),
        saved: false
      };
      selectionOverlay.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener("pointerdown", e => {
      if (inlineEditing) finishInlineTextEdit(true);
      const p = toLocalPoint(e);
      const obj = selected();
      const handle = hitHandle(p, obj);
      if (handle) {
        const objects = selectedObjects();
        state.dragging = { mode: handle.mode, start: p, obj: { ...obj }, objects: objects.map(o => ({ ...o })), bounds: selectionBounds(objects), saved: false };
        canvas.setPointerCapture(e.pointerId);
        renderAll();
        syncUi();
        return;
      }
      const target = hitTest(p);
      if (target && (e.shiftKey || e.metaKey || e.ctrlKey)) {
        toggleSelection(target.id);
      } else {
        setSelection(target ? [target.id] : []);
      }
      if (target) {
        const objects = selectedObjects();
        state.dragging = { mode: "move", start: p, obj: { ...target }, objects: objects.map(o => ({ ...o })), saved: false };
        canvas.setPointerCapture(e.pointerId);
      }
      renderAll();
      syncUi();
    });

    canvas.addEventListener("dblclick", e => {
      const target = hitTest(toLocalPoint(e));
      if (!target || target.type !== "text") return;
      e.preventDefault();
      startInlineTextEdit(target);
    });

    stage.addEventListener("pointerdown", e => {
      if (e.target !== stage) return;
      if (inlineEditing) finishInlineTextEdit(true);
      if (!selectedObjects().length) return;
      setSelection([]);
      renderAll();
      syncUi();
    });

    function handlePointerMove(e) {
      const objects = selectedObjects();
      if (!state.dragging || !objects.length) return;
      const p = toLocalPoint(e);
      const obj = selected();
      const dx = p.x - state.dragging.start.x;
      const dy = p.y - state.dragging.start.y;
      if (!state.dragging.saved) {
        if (Math.hypot(dx, dy) < 3) return;
        saveHistory();
        state.dragging.saved = true;
      }
      if (state.dragging.mode === "move") {
        state.dragging.objects.forEach(start => {
          const current = state.objects.find(o => o.id === start.id);
          if (!current) return;
          current.x = start.x + dx;
          current.y = start.y + dy;
        });
      }
      if (state.dragging.mode === "resize") {
        if (objects.length > 1 && state.dragging.bounds) {
          resizeObjects(objects, state.dragging.objects, state.dragging.bounds, dx, dy, e.shiftKey);
        } else if (obj) {
          resizeObject(obj, state.dragging.obj, dx, dy, e.shiftKey);
        }
      }
      if (state.dragging.mode === "rotate" && obj) {
        const cx = obj.x + obj.width / 2;
        const cy = obj.y + obj.height / 2;
        obj.rotation = Math.atan2(p.y - cy, p.x - cx) * 180 / Math.PI + 90;
      }
      renderAll();
      syncUi(false);
    }

    canvas.addEventListener("pointermove", handlePointerMove);
    selectionOverlay.addEventListener("pointermove", handlePointerMove);

    function handlePointerUp() {
      if (state.dragging) {
        const changed = state.dragging.saved;
        state.dragging = null;
        if (changed) persist();
        renderAll();
        syncUi();
      }
    }

    canvas.addEventListener("pointerup", handlePointerUp);
    selectionOverlay.addEventListener("pointerup", handlePointerUp);

    function addObject(obj) {
      saveHistory();
      state.objects.push(obj);
      setSelection([obj.id]);
      renderAll();
      syncUi();
      persist();
    }

    function defaultLockAspect(obj) {
      return obj.lockAspect ?? (obj.type === "image" || obj.kind === "circle");
    }

    function resizeObject(obj, start, dx, dy, invertLock = false) {
      const locked = invertLock ? !defaultLockAspect(obj) : defaultLockAspect(obj);
      let nextW = Math.max(28, start.width + dx);
      let nextH = Math.max(28, start.height + dy);
      if (locked) {
        const ratio = Math.max(.05, start.width / Math.max(1, start.height));
        if (Math.abs(dx) >= Math.abs(dy)) {
          nextH = nextW / ratio;
        } else {
          nextW = nextH * ratio;
        }
        nextW = Math.max(28, nextW);
        nextH = Math.max(28, nextH);
      }
      obj.width = nextW;
      obj.height = nextH;
      if (obj.kind === "circle" && locked) {
        const size = Math.max(nextW, nextH);
        obj.width = size;
        obj.height = size;
      }
    }

    function resizeObjects(objects, starts, bounds, dx, dy, invertLock = false) {
      const locked = invertLock ? false : true;
      let nextW = Math.max(28, bounds.width + dx);
      let nextH = Math.max(28, bounds.height + dy);
      if (locked) {
        const ratio = Math.max(.05, bounds.width / Math.max(1, bounds.height));
        if (Math.abs(dx) >= Math.abs(dy)) nextH = nextW / ratio;
        else nextW = nextH * ratio;
      }
      const sx = nextW / Math.max(1, bounds.width);
      const sy = nextH / Math.max(1, bounds.height);
      starts.forEach(start => {
        const obj = objects.find(o => o.id === start.id);
        if (!obj) return;
        obj.x = bounds.x + (start.x - bounds.x) * sx;
        obj.y = bounds.y + (start.y - bounds.y) * sy;
        obj.width = Math.max(1, start.width * sx);
        obj.height = Math.max(1, start.height * sy);
        if (obj.type === "text") obj.fontSize = Math.max(8, start.fontSize * Math.min(sx, sy));
      });
    }

    function updateSelected(patch) {
      const obj = selected();
      if (!obj) return;
      Object.assign(obj, patch);
      renderAll();
      syncUi(false);
      syncTransformInputs(obj);
      syncInspectorOutputs();
      persist();
    }

    });

    ["posX", "posY", "objWidth", "objHeight", "rotation", "textValue", "fontFamily", "fontSize", "fillColor", "strokeColor", "strokeWidth", "shapeRadius", "opacity", "shadow", "lockAspect"].forEach(id => {

        if (!obj) return;
        const keyMap = {
          posX: "x",

          objWidth: "width",
          objHeight: "height",
          rotation: "rotation",
          textValue: "text",
          fontFamily: "fontFamily",

        };

        if (id === "objWidth" || id === "objHeight") value = Math.max(1, value);
        if (id === "shapeRadius") value = Math.max(0, value);
        saveHistory();
        const patch = { [keyMap[id]]: value };
        if ((id === "objWidth" || id === "objHeight") && defaultLockAspect(obj)) {
          const ratio = Math.max(.05, obj.width / Math.max(1, obj.height));
          if (id === "objWidth") patch.height = obj.kind === "circle" ? value : Math.max(1, value / ratio);
          if (id === "objHeight") patch.width = obj.kind === "circle" ? value : Math.max(1, value * ratio);
          if (obj.kind === "circle") {
            patch.width = value;
            patch.height = value;
          }
        }
        updateSelected(patch);
      };
      wire(id, id === "lockAspect" ? "change" : "input", handler);

    function alignObjects(mode) {
      const objects = selectedObjects();
      if (!objects.length) return;
      const bounds = selectionBounds(objects);
      if (!bounds) return;
      const target = objects.length > 1
        ? mode === "left" ? bounds.x : mode === "right" ? bounds.right : bounds.x + bounds.width / 2
        : mode === "left" ? 0 : mode === "right" ? state.width : state.width / 2;
      saveHistory();
      objects.forEach(obj => {
        if (mode === "left") obj.x = target;
        if (mode === "center") obj.x = target - obj.width / 2;
        if (mode === "right") obj.x = target - obj.width;
      });
      renderAll();
      syncUi();
      persist();
    }

    function setTextAlign(align) {

      persist();

    function moveLayer(delta) {
      const index = state.objects.findIndex(o => o.id === state.selectedId);
      if (index < 0) return;
      saveHistory();
      const [obj] = state.objects.splice(index, 1);
      const next = delta > 50 ? state.objects.length : delta < -50 ? 0 : Math.max(0, Math.min(state.objects.length, index + delta));
      state.objects.splice(next, 0, obj);
      renderAll();
      syncUi();
      persist();
    }

    async function undo() {

    document.addEventListener("keydown", e => {
      const tag = document.activeElement.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
      if (e.key === "Delete" || e.key === "Backspace") deleteSelected();
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "z") undo();
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "y") redo();
      const objects = selectedObjects();
      if (!objects.length) return;
      const step = e.shiftKey ? 10 : 1;
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) {
        saveHistory();
        objects.forEach(obj => {
          if (e.key === "ArrowUp") obj.y -= step;
          if (e.key === "ArrowDown") obj.y += step;
          if (e.key === "ArrowLeft") obj.x -= step;
          if (e.key === "ArrowRight") obj.x += step;
        });
        renderAll();
        syncUi(false);
        syncTransformInputs();
        persist();
      }
    });

    wire("zoomSelect", "change", () => {

    stage.addEventListener("wheel", e => {
      if (!e.altKey) return;
      e.preventDefault();
      const before = canvas.getBoundingClientRect();
      const focusX = before.width ? (e.clientX - before.left) / before.width : .5;
      const focusY = before.height ? (e.clientY - before.top) / before.height : .5;
      const factor = e.deltaY < 0 ? 1.08 : 1 / 1.08;
      const nextScale = (state.zoomScale || before.width / state.width || 1) * factor;
      const zoomSelect = document.getElementById("zoomSelect");
      zoomSelect.value = "custom";
      setCanvasScale(nextScale);
      const after = canvas.getBoundingClientRect();
      stage.scrollLeft += (after.width - before.width) * focusX;
      stage.scrollTop += (after.height - before.height) * focusY;
      renderAll();
      persist();
    }, { passive: false });

    async function addLogoToCanvas(asset) {
      const img = await loadImage(asset.src);
      const maxW = state.width * .24;
      const maxH = state.height * .12;
      const ratio = img.width / img.height;
      let w = Math.min(maxW, img.width);
      let h = w / ratio;
      if (h > maxH) {
        h = maxH;
        w = h * ratio;
      }
      const obj = imageObject(img, state.width - w - state.width * .08, state.height * .07, w, h, asset.src);
      obj.name = asset.label;
      obj.lockAspect = true;
      addObject(obj);
      normalizeObjectImageSource(obj);
    }

    async function addMascotToCanvas(asset) {
      const img = await loadImage(asset.src);

      const maxH = state.height * .28;
      const ratio = img.width / img.height;
      let w = Math.min(maxW, img.width);
      let h = w / ratio;
      if (h > maxH) {
        h = maxH;
        w = h * ratio;
      }
      const obj = imageObject(img, state.width - w - state.width * .08, state.height - h - state.height * .08, w, h, asset.src);

    async function loadImageAssets(folder, fallbackNames) {
      const fromFallback = () => fallbackNames.map(name => ({
        label: fileLabel(name),
        src: `${folder}/${encodeURIComponent(name)}`
      }));
      try {
        const response = await fetch(`${folder}/`);
        if (!response.ok) throw new Error(`${folder} directory unavailable`);
        const html = await response.text();
        const matches = [...html.matchAll(/href="([^"]+\.(?:png|jpe?g|webp|svg))"/gi)]
          .map(match => decodeURIComponent(match[1]))
          .filter(path => !path.startsWith("."));
        const unique = [...new Set(matches)];
        return unique.length
          ? unique.map(path => ({ label: fileLabel(path), src: `${folder}/${encodeURIComponent(path.split("/").pop())}` }))
          : fromFallback();
      } catch (err) {
        return fromFallback();
      }
    }

    function readFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function assetSourceToDataUrl(src) {
      if (src.startsWith("data:")) return src;
      try {
        const response = await fetch(src);
        if (!response.ok) throw new Error("asset fetch failed");
        const blob = await response.blob();
        return await readFile(blob);
      } catch (err) {
        return src;
      }
    }

    async function normalizeObjectImageSource(obj) {
      if (!obj || obj.type !== "image" || !obj.src || obj.src.startsWith("data:")) return;
      const dataUrl = await assetSourceToDataUrl(obj.src);
      if (dataUrl === obj.src) return;
      obj.src = dataUrl;
      obj.image = await loadImage(dataUrl);
      renderAll();
      persist();
    }

    async function normalizeAllImageSources() {
      for (const obj of state.objects) {
        await normalizeObjectImageSource(obj);
      }
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        if (!src.startsWith("data:") && !src.startsWith("blob:")) img.crossOrigin = "anonymous";
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function setPreset(preset, keepObjects = false) {
      saveHistory();
      const oldW = state.width;
      const oldH = state.height;
      state.width = preset.width;
      state.height = preset.height;
      state.platform = preset.platform;
      state.label = preset.label;
      if (keepObjects) {
        const sx = state.width / oldW;
        const sy = state.height / oldH;
        state.objects.forEach(o => {
          o.x *= sx; o.y *= sy; o.width *= sx; o.height *= sy;
          if (o.type === "text") o.fontSize *= Math.min(sx, sy);
        });
      } else {
        state.objects = [];
        setSelection([]);
      }
      resizeCanvas();
      renderAll();
      syncUi();
      persist();
    }
